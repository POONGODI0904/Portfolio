<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills - Personal Portfolio website</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="skills.css?v=1">
</head>
<body>
    
    <nav class="navbar">
        <a href="index.html" class="logo">Portfolio.</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li class="active"><a href="skills.html">Skills</a></li>
            <li><a href="certificates.html">Certificates</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="bars-animation">
        <div class="bar" style="--i:6;"></div>
        <div class="bar" style="--i:5;"></div>
        <div class="bar" style="--i:4;"></div>
        <div class="bar" style="--i:3;"></div>
        <div class="bar" style="--i:2;"></div>
        <div class="bar" style="--i:1;"></div>
    </div>

    <section class="skills-section">
        <h1 class="skills-title">My Skills</h1>
        
        <div class="skills-container">
            <!-- Technical Skills (HTML, CSS, REACT, JS) -->
            <div class="skills-box">
                <h2>Technical Skills</h2>
                <div class="radial-bars">
                    
                    <!-- HTML (90%) -->
                    <div class="radial-bar">
                        <svg x="0px" y="0px" viewBox="0 0 200 200">
                            <circle class="progress-bar" cx="100" cy="100" r="80"></circle>
                            <circle class="path" style="--dashoffset: 50.2;" cx="100" cy="100" r="80"></circle>
                        </svg>
                        <div class="percentage">90%</div>
                        <div class="text">HTML</div>
                    </div>
                    
                    <!-- CSS (85%) -->
                    <div class="radial-bar">
                        <svg x="0px" y="0px" viewBox="0 0 200 200">
                            <circle class="progress-bar" cx="100" cy="100" r="80"></circle>
                            <circle class="path" style="--dashoffset: 75.3;" cx="100" cy="100" r="80"></circle>
                        </svg>
                        <div class="percentage">85%</div>
                        <div class="text">CSS</div>
                    </div>
                    
                    <!-- JavaScript (80%) -->
                    <div class="radial-bar">
                        <svg x="0px" y="0px" viewBox="0 0 200 200">
                            <circle class="progress-bar" cx="100" cy="100" r="80"></circle>
                            <circle class="path" style="--dashoffset: 100.4;" cx="100" cy="100" r="80"></circle>
                        </svg>
                        <div class="percentage">80%</div>
                        <div class="text">JS</div>
                    </div>
                    
                    <!-- React (75%) -->
                    <div class="radial-bar">
                        <svg x="0px" y="0px" viewBox="0 0 200 200">
                            <circle class="progress-bar" cx="100" cy="100" r="80"></circle>
                            <circle class="path" style="--dashoffset: 125.5;" cx="100" cy="100" r="80"></circle>
                        </svg>
                        <div class="percentage">75%</div>
                        <div class="text">React</div>
                    </div>
                    
                </div>
            </div>

            <!-- Professional Skills (MS OFFICE, TALLY) -->
            <div class="skills-box">
                <h2>Office & Financial Skills</h2>
                <div class="radial-bars">
                    
                    <!-- MS Office (80%) -->
                    <div class="radial-bar">
                        <svg x="0px" y="0px" viewBox="0 0 200 200">
                            <circle class="progress-bar" cx="100" cy="100" r="80"></circle>
                            <circle class="path" style="--dashoffset: 100.4;" cx="100" cy="100" r="80"></circle>
                        </svg>
                        <div class="percentage">80%</div>
                        <div class="text">MS Office</div>
                    </div>
                    
                    <!-- Tally (70%) -->
                    <div class="radial-bar">
                        <svg x="0px" y="0px" viewBox="0 0 200 200">
                            <circle class="progress-bar" cx="100" cy="100" r="80"></circle>
                            <circle class="path" style="--dashoffset: 150.6;" cx="100" cy="100" r="80"></circle>
                        </svg>
                        <div class="percentage">70%</div>
                        <div class="text">Tally</div>
                    </div>
                    
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
